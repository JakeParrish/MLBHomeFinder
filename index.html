<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MLB Home Finder</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --home: #2ea043;
    --home-bg: #12361f;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 24px 16px 8px;
    text-align: center;
  }
  header h1 { margin: 0; font-size: 1.6rem; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 0.9rem; }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
  }
  .cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-head button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 1rem;
  }
  .cal-head button:hover { border-color: var(--accent); }
  .cal-head h2 { margin: 0; font-size: 1.2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .dow {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding-bottom: 4px;
    font-weight: 600;
  }
  .day {
    aspect-ratio: 1 / 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.95rem;
    transition: border-color .1s, background .1s;
  }
  .day:hover { border-color: var(--accent); }
  .day.empty { background: transparent; border: none; cursor: default; }
  .day.today { border-color: var(--accent); font-weight: 700; }
  .day.selected { background: var(--accent); color: #0d1117; font-weight: 700; }

  .detail { margin-top: 24px; }
  .detail h3 { font-size: 1.1rem; margin: 0 0 12px; }
  .status { color: var(--muted); padding: 12px 0; }
  .game {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .matchup {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .team {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    flex: 1 1 200px;
  }
  .team.home {
    background: var(--home-bg);
    border-color: var(--home);
  }
  .team-name {
    font-weight: 600;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    width: 30px;
    height: 30px;
    flex: 0 0 auto;
    object-fit: contain;
  }
  .record {
    font-weight: 400;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .score {
    display: inline-block;
    min-width: 1.4em;
    margin-left: 6px;
    padding: 0 6px;
    border-radius: 6px;
    background: #21262d;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
  .score.win { background: var(--accent); color: #0d1117; }
  .live-badge {
    color: #f85149;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f85149; display: inline-block;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: .05em;
    color: var(--home);
    text-transform: uppercase;
  }
  .away-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .pitcher { color: var(--muted); font-size: 0.85rem; }
  .pitcher b { color: var(--text); font-weight: 500; }
  .at {
    color: var(--muted);
    font-weight: 700;
    flex: 0 0 auto;
  }
  .game-meta {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.8rem;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>
<header>
  <h1>⚾ MLB Home Finder</h1>
  <p>Pick a date to see who's playing at home</p>
</header>

<div class="wrap">
  <div class="cal-head">
    <button id="prev" aria-label="Previous month">‹</button>
    <h2 id="monthLabel"></h2>
    <button id="next" aria-label="Next month">›</button>
  </div>
  <div class="grid" id="dow"></div>
  <div class="grid" id="days"></div>

  <div class="detail" id="detail"></div>
</div>

<script>
const API = "https://statsapi.mlb.com/api/v1/schedule";
const monthNames = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
const dowNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let viewDate = new Date();
let selectedKey = null;

const $ = (id) => document.getElementById(id);

// Render day-of-week header once
$("dow").innerHTML = dowNames.map(d => `<div class="dow">${d}</div>`).join("");

function ymd(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}

function renderCalendar() {
  const y = viewDate.getFullYear();
  const m = viewDate.getMonth();
  $("monthLabel").textContent = `${monthNames[m]} ${y}`;

  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  const today = new Date();
  const todayKey = ymd(today.getFullYear(), today.getMonth(), today.getDate());

  let cells = "";
  for (let i = 0; i < firstDow; i++) cells += `<div class="day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = ymd(y, m, d);
    const cls = ["day"];
    if (key === todayKey) cls.push("today");
    if (key === selectedKey) cls.push("selected");
    cells += `<div class="${cls.join(" ")}" data-key="${key}">${d}</div>`;
  }
  $("days").innerHTML = cells;

  $("days").querySelectorAll(".day[data-key]").forEach(el => {
    el.addEventListener("click", () => selectDate(el.dataset.key));
  });
}

function fmtPretty(key) {
  const [y, m, d] = key.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString(undefined, {
    weekday: "long", month: "long", day: "numeric", year: "numeric"
  });
}

async function selectDate(key) {
  selectedKey = key;
  renderCalendar();
  const detail = $("detail");
  detail.innerHTML = `<h3>${fmtPretty(key)}</h3><div class="status">Loading schedule…</div>`;

  try {
    const url = `${API}?sportId=1&date=${key}&hydrate=probablePitcher,team,linescore`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const games = (data.dates && data.dates[0] && data.dates[0].games) || [];
    renderGames(key, games);
  } catch (err) {
    detail.innerHTML = `<h3>${fmtPretty(key)}</h3>
      <div class="status">Couldn't load schedule (${err.message}).</div>`;
  }
}

function pitcherName(side) {
  return (side.probablePitcher && side.probablePitcher.fullName) || "TBD";
}

function logoUrl(side) {
  const id = side.team && side.team.id;
  return id ? `https://www.mlbstatic.com/team-logos/${id}.svg` : "";
}

function recordTag(side) {
  const r = side.leagueRecord;
  if (!r || typeof r.wins !== "number" || typeof r.losses !== "number") return "";
  return `<span class="record">(${r.wins}-${r.losses})</span>`;
}

function scoreTag(side, hasScore) {
  if (!hasScore) return "";
  const winner = side.isWinner === true ? " win" : "";
  return ` <span class="score${winner}">${side.score}</span>`;
}

function gameTime(g) {
  if (!g.gameDate) return "";
  const dt = new Date(g.gameDate);
  // Always display in US Eastern time, no matter where the viewer is.
  const t = dt.toLocaleTimeString("en-US", {
    hour: "numeric", minute: "2-digit", timeZone: "America/New_York"
  });
  return `${t} ET`;
}

function renderGames(key, games) {
  const detail = $("detail");
  let html = `<h3>${fmtPretty(key)}</h3>`;

  if (!games.length) {
    html += `<div class="status">No MLB games scheduled.</div>`;
    detail.innerHTML = html;
    return;
  }

  for (const g of games) {
    const home = g.teams.home;
    const away = g.teams.away;
    const status = (g.status && g.status.detailedState) || "";
    const isLive = g.status && g.status.abstractGameState === "Live";
    const hasScore = typeof away.score === "number" && typeof home.score === "number";
    const ls = g.linescore || {};
    const inning = ls.inningState && ls.currentInningOrdinal
      ? `${ls.inningState} ${ls.currentInningOrdinal}` : "";
    html += `
      <div class="game">
        <div class="matchup">
          <div class="team">
            <span class="away-label">Away</span>
            <span class="team-name">
              <img class="logo" src="${logoUrl(away)}" alt="" loading="lazy" />
              <span>${away.team.name}</span>${recordTag(away)}${scoreTag(away, hasScore)}
            </span>
            <span class="pitcher">P: <b>${pitcherName(away)}</b></span>
          </div>
          <div class="at">@</div>
          <div class="team home">
            <span class="badge">🏠 Home</span>
            <span class="team-name">
              <img class="logo" src="${logoUrl(home)}" alt="" loading="lazy" />
              <span>${home.team.name}</span>${recordTag(home)}${scoreTag(home, hasScore)}
            </span>
            <span class="pitcher">P: <b>${pitcherName(home)}</b></span>
          </div>
        </div>
        <div class="game-meta">
          ${gameTime(g) ? `<span>🕒 ${gameTime(g)}</span>` : ""}
          ${isLive
            ? `<span class="live-badge"><span class="live-dot"></span>LIVE${inning ? ` · ${inning}` : ""}</span>`
            : (status ? `<span>${status}</span>` : "")}
          ${g.venue && g.venue.name ? `<span>📍 ${g.venue.name}</span>` : ""}
        </div>
      </div>`;
  }
  detail.innerHTML = html;
}

$("prev").addEventListener("click", () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
  renderCalendar();
});
$("next").addEventListener("click", () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);
  renderCalendar();
});

// Initial render + auto-select today
renderCalendar();
const t = new Date();
selectDate(ymd(t.getFullYear(), t.getMonth(), t.getDate()));
</script>
</body>
</html>
